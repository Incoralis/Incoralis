<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incoralis Ltd</title>

  <link rel="icon" type="image/png" href="favicon.png" />

  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Orbitron", Arial, sans-serif;
      color: #ffffff;
      background: #000;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      background-image: url("background_landscape.png");
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;
    }

    .page {
      min-height: 100vh;
      padding: clamp(12px, 2vw, 32px);
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: clamp(10px, 2vw, 24px);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      min-height: 42px;
      padding: 10px 18px;
      color: #ffffff;
      text-decoration: none;
      text-transform: uppercase;
      font-size: clamp(11px, 1vw, 13px);
      letter-spacing: 0.12em;
      border-bottom: 2px solid #00ebff;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0));
      box-shadow: 0 8px 22px rgba(0,235,255,0.18);
    }

    .logo {
      width: clamp(180px, 26vw, 420px);
      max-height: 220px;
      object-fit: contain;
      object-position: top right;
    }

    main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: clamp(18px, 3vh, 36px);
      padding: clamp(0px, 2vh, 24px) 0 clamp(12px, 4vh, 42px);
      transform: translateY(-24px);
    }

    .app-news {
      width: min(520px, 58vw);
      height: auto;
      display: block;
    }

    .legal-tabs {
      display: grid;
      grid-template-columns: repeat(4, auto);
      justify-content: center;
      gap: clamp(12px, 2vw, 20px);
      align-items: center;
      margin-top: clamp(-8px, -1vh, 0px);
    }

    .legal-tab {
      display: block;
      width: clamp(96px, 12vw, 150px);
      text-decoration: none;
      transition: transform 180ms ease, filter 180ms ease;
    }

    .legal-tab:hover,
    .legal-tab:focus-visible {
      transform: translateY(-2px);
      filter: brightness(1.18);
      outline: none;
    }

    .legal-tab img {
      width: 100%;
      height: auto;
      display: block;
    }

    footer {
      text-align: center;
      font-size: clamp(6px, 0.65vw, 9px);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.42);
      padding-bottom: 6px;
      font-family: "Orbitron", Arial, sans-serif;
    }

    @media (orientation: portrait) {
      body {
        background-image: url("background_portrait.png");
      }
    }

    @media (max-width: 820px) {
      .logo {
        width: clamp(170px, 34vw, 320px);
      }
    }

    @media (max-width: 500px) {
      .page {
        padding: 10px;
      }

      header {
        gap: 6px;
      }

      .logo {
        width: clamp(145px, 46vw, 230px);
      }

      main {
        gap: clamp(16px, 3vh, 28px);
        padding-top: 8px;
        transform: translateY(-12px);
      }

      .app-news {
        width: 100%;
      }

      .legal-tab {
        width: clamp(72px, 20vw, 110px);
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <a class="back-link" href="index.html">← Back to Main Page</a>

      <img src="incoralis_logo3.png" alt="Incoralis Ltd" class="logo" />
    </header>

    <main>
      <img
        src="appnews.png"
        alt="New app coming soon"
        class="app-news"
      />

      <nav class="legal-tabs" aria-label="Incoralis legal navigation">
        <a href="incoralis_disclaimer.html" class="legal-tab">
          <img src="disclaimer.png" alt="Disclaimer" />
        </a>

        <a href="incoralis_privacy.html" class="legal-tab">
          <img src="privacy.png" alt="Privacy Policy" />
        </a>

        <a href="incoralis_terms.html" class="legal-tab">
          <img src="terms.png" alt="Terms and Conditions" />
        </a>

        <a href="incoralis_contact.html" class="legal-tab">
          <img src="contact.png" alt="Contact" />
        </a>
      </nav>
    </main>

    <footer>
      © 2026 Incoralis Limited. All rights reserved.
    </footer>
  </div>
</body>
</html>
