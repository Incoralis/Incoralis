<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel ChecknGo Photos</title>

  <link rel="canonical" href="https://incoralis.co.uk/TC/photos/" />

  <link rel="icon" type="image/png" href="../../assets/favicon.png" />

  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Orbitron", Arial, sans-serif;
      color: #ffffff;
      background: #000;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      background-image: url("../../assets/background_landscape.png");
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;
    }

    .page {
      min-height: 100vh;
      padding: clamp(10px, 2vw, 32px);
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: clamp(8px, 2vw, 24px);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      min-height: clamp(30px, 4vw, 42px);
      padding: clamp(6px, 1vw, 10px) clamp(10px, 1.5vw, 18px);
      color: #ffffff;
      text-decoration: none;
      text-transform: uppercase;
      font-size: clamp(8px, 0.9vw, 13px);
      letter-spacing: 0.12em;
      border-bottom: 2px solid #00ebff;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0));
      box-shadow: 0 8px 22px rgba(0,235,255,0.18);
    }

    .logo {
      width: clamp(145px, 20vw, 320px);
      max-height: 170px;
      object-fit: contain;
      object-position: top right;
    }

    main {
      display: flex;
      justify-content: center;
      padding: clamp(20px, 4vh, 40px) 0;
    }

    .photos-panel {
      width: min(1100px, 94vw);
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255,255,255,0.1);
      padding: clamp(18px, 3vw, 38px);
      backdrop-filter: blur(3px);
    }

    .page-title {
      font-size: clamp(18px, 2vw, 32px);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-align: center;
      color: #00ebff;
      margin-bottom: clamp(22px, 4vh, 40px);
    }

    .screenshot-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: clamp(14px, 2vw, 28px);
      align-items: start;
    }

    .screenshot-card {
      width: 100%;
    }

    .screenshot-button {
      display: block;
      width: 100%;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .screenshot-button img {
      width: 100%;
      height: auto;
      display: block;
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 10px 28px rgba(0,235,255,0.12);
      transition: transform 180ms ease, filter 180ms ease;
    }

    .screenshot-button:hover img,
    .screenshot-button:focus-visible img {
      transform: translateY(-3px);
      filter: brightness(1.12);
    }

    .screenshot-button:focus-visible {
      outline: 2px solid #00ebff;
      outline-offset: 4px;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: clamp(18px, 4vw, 44px);
      background: rgba(0, 0, 0, 0.88);
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox-content {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: min(92vw, 980px);
      height: min(88vh, 860px);
    }

    .lightbox-image {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      display: block;
      border: 1px solid rgba(255,255,255,0.22);
      box-shadow: 0 18px 48px rgba(0,235,255,0.22);
      background: #000;
    }

    .lightbox-close,
    .lightbox-arrow {
      position: absolute;
      border: 1px solid rgba(0,235,255,0.65);
      background: rgba(0, 0, 0, 0.65);
      color: #ffffff;
      font-family: "Orbitron", Arial, sans-serif;
      cursor: pointer;
      transition: transform 180ms ease, filter 180ms ease, background 180ms ease;
    }

    .lightbox-close:hover,
    .lightbox-close:focus-visible,
    .lightbox-arrow:hover,
    .lightbox-arrow:focus-visible {
      transform: scale(1.06);
      filter: brightness(1.18);
      background: rgba(0, 0, 0, 0.85);
      outline: none;
    }

    .lightbox-close {
      top: clamp(10px, 2vw, 22px);
      right: clamp(10px, 2vw, 22px);
      width: clamp(34px, 4vw, 46px);
      height: clamp(34px, 4vw, 46px);
      font-size: clamp(18px, 2vw, 26px);
      line-height: 1;
    }

    .lightbox-arrow {
      top: 50%;
      width: clamp(36px, 5vw, 54px);
      height: clamp(48px, 7vw, 74px);
      font-size: clamp(24px, 4vw, 42px);
      line-height: 1;
      transform: translateY(-50%);
    }

    .lightbox-arrow:hover,
    .lightbox-arrow:focus-visible {
      transform: translateY(-50%) scale(1.06);
    }

    .lightbox-prev {
      left: clamp(8px, 2vw, 28px);
    }

    .lightbox-next {
      right: clamp(8px, 2vw, 28px);
    }

    footer {
      text-align: center;
      font-size: clamp(8px, 0.85vw, 12px);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.42);
      padding-bottom: 6px;
    }

    @media (orientation: portrait) {
      body {
        background-image: url("../../assets/background_portrait.png");
      }
    }

    @media (max-width: 1000px) {
      .screenshot-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 820px) {
      .logo {
        width: clamp(140px, 28vw, 260px);
      }
    }

    @media (max-width: 500px) {
      .page {
        padding: 10px;
      }

      header {
        gap: 6px;
      }

      .logo {
        width: clamp(125px, 40vw, 200px);
      }

      .photos-panel {
        width: 100%;
        padding: 16px;
      }

      .screenshot-grid {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .lightbox {
        padding: 14px;
      }

      .lightbox-content {
        width: 94vw;
        height: 84vh;
      }

      .lightbox-prev {
        left: 4px;
      }

      .lightbox-next {
        right: 4px;
      }

      footer {
        letter-spacing: 0.08em;
        line-height: 1.5;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <a class="back-link" href="/TC/">← Back</a>

      <img
        src="../../assets/incoralis_logo3.png"
        alt="Incoralis Ltd"
        class="logo"
      />
    </header>

    <main>
      <div class="photos-panel">
        <div class="page-title">Photos</div>

        <div class="screenshot-grid">
          <div class="screenshot-card">
            <button class="screenshot-button" type="button" data-index="0" aria-label="Enlarge Travel ChecknGo screenshot 1">
              <img src="../../assets/Screenshotfinal 1.png" alt="Travel ChecknGo screenshot 1" />
            </button>
          </div>

          <div class="screenshot-card">
            <button class="screenshot-button" type="button" data-index="1" aria-label="Enlarge Travel ChecknGo screenshot 2">
              <img src="../../assets/Screenshotfinal 2.png" alt="Travel ChecknGo screenshot 2" />
            </button>
          </div>

          <div class="screenshot-card">
            <button class="screenshot-button" type="button" data-index="2" aria-label="Enlarge Travel ChecknGo screenshot 3">
              <img src="../../assets/Screenshotfinal 3.png" alt="Travel ChecknGo screenshot 3" />
            </button>
          </div>

          <div class="screenshot-card">
            <button class="screenshot-button" type="button" data-index="3" aria-label="Enlarge Travel ChecknGo screenshot 4">
              <img src="../../assets/Screenshotfinal 4.png" alt="Travel ChecknGo screenshot 4" />
            </button>
          </div>

          <div class="screenshot-card">
            <button class="screenshot-button" type="button" data-index="4" aria-label="Enlarge Travel ChecknGo screenshot 5">
              <img src="../../assets/Screenshotfinal 5.png" alt="Travel ChecknGo screenshot 5" />
            </button>
          </div>

          <div class="screenshot-card">
            <button class="screenshot-button" type="button" data-index="5" aria-label="Enlarge Travel ChecknGo screenshot 6">
              <img src="../../assets/Screenshotfinal 6.png" alt="Travel ChecknGo screenshot 6" />
            </button>
          </div>

          <div class="screenshot-card">
            <button class="screenshot-button" type="button" data-index="6" aria-label="Enlarge Travel ChecknGo screenshot 7">
              <img src="../../assets/Screenshotfinal 7.png" alt="Travel ChecknGo screenshot 7" />
            </button>
          </div>

          <div class="screenshot-card">
            <button class="screenshot-button" type="button" data-index="7" aria-label="Enlarge Travel ChecknGo screenshot 8">
              <img src="../../assets/Screenshotfinal 8.png" alt="Travel ChecknGo screenshot 8" />
            </button>
          </div>
        </div>
      </div>
    </main>

    <footer>
      © 2026 Incoralis Limited. Part of Incoralis Group Limited. All rights reserved.
    </footer>
  </div>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox-close" type="button" id="lightboxClose" aria-label="Close enlarged screenshot">×</button>
    <button class="lightbox-arrow lightbox-prev" type="button" id="lightboxPrev" aria-label="Previous screenshot">‹</button>

    <div class="lightbox-content" id="lightboxContent">
      <img class="lightbox-image" id="lightboxImage" src="../../assets/Screenshotfinal 1.png" alt="Travel ChecknGo screenshot 1 enlarged" />
    </div>

    <button class="lightbox-arrow lightbox-next" type="button" id="lightboxNext" aria-label="Next screenshot">›</button>
  </div>

  <script>
    const screenshots = [
      {
        src: "../../assets/Screenshotfinal 1.png",
        alt: "Travel ChecknGo screenshot 1 enlarged"
      },
      {
        src: "../../assets/Screenshotfinal 2.png",
        alt: "Travel ChecknGo screenshot 2 enlarged"
      },
      {
        src: "../../assets/Screenshotfinal 3.png",
        alt: "Travel ChecknGo screenshot 3 enlarged"
      },
      {
        src: "../../assets/Screenshotfinal 4.png",
        alt: "Travel ChecknGo screenshot 4 enlarged"
      },
      {
        src: "../../assets/Screenshotfinal 5.png",
        alt: "Travel ChecknGo screenshot 5 enlarged"
      },
      {
        src: "../../assets/Screenshotfinal 6.png",
        alt: "Travel ChecknGo screenshot 6 enlarged"
      },
      {
        src: "../../assets/Screenshotfinal 7.png",
        alt: "Travel ChecknGo screenshot 7 enlarged"
      },
      {
        src: "../../assets/Screenshotfinal 8.png",
        alt: "Travel ChecknGo screenshot 8 enlarged"
      }
    ];

    const lightbox = document.getElementById("lightbox");
    const lightboxImage = document.getElementById("lightboxImage");
    const lightboxClose = document.getElementById("lightboxClose");
    const lightboxPrev = document.getElementById("lightboxPrev");
    const lightboxNext = document.getElementById("lightboxNext");
    const lightboxContent = document.getElementById("lightboxContent");
    const screenshotButtons = document.querySelectorAll(".screenshot-button");

    let currentIndex = 0;
    let touchStartX = 0;
    let touchEndX = 0;

    function showImage(index) {
      currentIndex = (index + screenshots.length) % screenshots.length;
      lightboxImage.src = screenshots[currentIndex].src;
      lightboxImage.alt = screenshots[currentIndex].alt;
    }

    function openLightbox(index) {
      showImage(index);
      lightbox.classList.add("open");
      lightbox.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
      lightboxClose.focus();
    }

    function closeLightbox() {
      lightbox.classList.remove("open");
      lightbox.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    function showPrevious() {
      showImage(currentIndex - 1);
    }

    function showNext() {
      showImage(currentIndex + 1);
    }

    screenshotButtons.forEach((button) => {
      button.addEventListener("click", () => {
        openLightbox(Number(button.dataset.index));
      });
    });

    lightboxClose.addEventListener("click", closeLightbox);
    lightboxPrev.addEventListener("click", showPrevious);
    lightboxNext.addEventListener("click", showNext);

    lightbox.addEventListener("click", (event) => {
      if (event.target === lightbox) {
        closeLightbox();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (!lightbox.classList.contains("open")) {
        return;
      }

      if (event.key === "Escape") {
        closeLightbox();
      }

      if (event.key === "ArrowLeft") {
        showPrevious();
      }

      if (event.key === "ArrowRight") {
        showNext();
      }
    });

    lightboxContent.addEventListener("touchstart", (event) => {
      touchStartX = event.changedTouches[0].screenX;
    });

    lightboxContent.addEventListener("touchend", (event) => {
      touchEndX = event.changedTouches[0].screenX;

      if (touchStartX - touchEndX > 50) {
        showNext();
      }

      if (touchEndX - touchStartX > 50) {
        showPrevious();
      }
    });
  </script>
</body>
</html>
