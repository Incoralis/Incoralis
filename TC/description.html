<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel ChecknGo Description</title>

  <link rel="icon" type="image/png" href="../assets/favicon.png" />

  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Orbitron", Arial, sans-serif;
      color: #ffffff;
      background: #000;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      background-image: url("../assets/background_landscape.png");
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;
    }

    .page {
      min-height: 100vh;
      padding: clamp(10px, 2vw, 32px);
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: clamp(8px, 2vw, 24px);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      min-height: clamp(30px, 4vw, 42px);
      padding: clamp(6px, 1vw, 10px) clamp(10px, 1.5vw, 18px);
      color: #ffffff;
      text-decoration: none;
      text-transform: uppercase;
      font-size: clamp(8px, 0.9vw, 13px);
      letter-spacing: 0.12em;
      border-bottom: 2px solid #00ebff;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0));
      box-shadow: 0 8px 22px rgba(0,235,255,0.18);
    }

    .logo {
      width: clamp(145px, 20vw, 320px);
      max-height: 170px;
      object-fit: contain;
      object-position: top right;
    }

    main {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: clamp(20px, 4vh, 40px) 0;
    }

    .page-title {
      font-size: clamp(18px, 2vw, 32px);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-align: center;
    }

    footer {
      text-align: center;
      font-size: clamp(8px, 0.85vw, 12px);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.42);
      padding-bottom: 6px;
    }

    @media (orientation: portrait) {
      body {
        background-image: url("../assets/background_portrait.png");
      }
    }

    @media (max-width: 820px) {
      .logo {
        width: clamp(140px, 28vw, 260px);
      }
    }

    @media (max-width: 500px) {
      .page {
        padding: 10px;
      }

      header {
        gap: 6px;
      }

      .logo {
        width: clamp(125px, 40vw, 200px);
      }

      footer {
        letter-spacing: 0.08em;
        line-height: 1.5;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <a class="back-link" href="index.html">← Back</a>

      <img
        src="../assets/incoralis_logo3.png"
        alt="Incoralis Ltd"
        class="logo"
      />
    </header>

    <main>
      <div class="page-title">Description</div>
    </main>

    <footer>
      © 2026 Incoralis Limited. Part of Incoralis Group Limited. All rights reserved.
    </footer>
  </div>
</body>
</html>
