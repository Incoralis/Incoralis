<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incoralis Group Limited</title>
  <link rel="icon" type="image/png" href="favicon.png">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      background-image: url("background.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #000;
    }

    .logo-top-right {
      position: absolute;
      top: 50px;
      right: 50px;
      width: clamp(120px, 12vw, 220px);
      height: auto;
    }

    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(48px, 8vw, 120px);
      background: linear-gradient(90deg, #00aaff, #ff2bbf, #ff8a00);
      -webkit-background-clip: text;
      color: transparent;
    }

    p {
      margin: 8px 0;
      font-size: clamp(18px, 2vw, 28px);
      color: #ffffff;
    }
  </style>
</head>
<body>

  <img src="logo2.png" alt="Incoralis Logo" class="logo-top-right">

  <main>
    <h1>Incoralis</h1>
    <p>Website coming soon.</p>
    <p>Contact: admin@incoralis.co.uk</p>
  </main>

</body>
</html>
</body>
</html>
