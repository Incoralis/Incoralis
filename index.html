<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incoralis Group Limited</title>

  <link rel="icon" type="image/png" href="favicon.png" />

  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #000;
      color: #fff;
      font-family: "Orbitron", Arial, sans-serif;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      background-image: url("background_landscape.png");
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;
    }

    .page {
      min-height: 100vh;
      padding: clamp(12px, 2vw, 32px);
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: clamp(10px, 2vw, 24px);
    }

    .top-tabs {
      display: grid;
      grid-template-columns: repeat(4, auto);
      gap: clamp(6px, 1vw, 14px);
      align-items: start;
    }

    .top-tab {
      display: block;
      width: clamp(68px, 9vw, 118px);
      text-align: center;
      text-decoration: none;
      transition:
        transform 180ms ease,
        filter 180ms ease;
    }

    .top-tab:hover,
    .top-tab:focus-visible {
      transform: translateY(-2px);
      filter: brightness(1.18);
      outline: none;
    }

    .top-tab img {
      width: 100%;
      height: auto;
      display: block;
    }

    .group-logo {
      width: clamp(110px, 16vw, 250px);
      height: auto;
      object-fit: contain;
      object-position: top right;
    }

    main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: clamp(30px, 5vh, 58px);
      padding: clamp(0px, 2vh, 24px) 0 clamp(12px, 4vh, 42px);
      transform: translateY(-24px);
    }

    .app-news {
      width: min(520px, 58vw);
      height: auto;
      display: block;
    }

    .incoralis-link {
      display: block;
      width: min(340px, 40vw);
      margin-left: clamp(-220px, -15vw, -70px);
      transition:
        transform 180ms ease,
        filter 180ms ease;
    }

    .incoralis-link:hover,
    .incoralis-link:focus-visible {
      transform: translateY(-4px);
      filter: brightness(1.12);
      outline: none;
    }

    .incoralis-link img {
      width: 100%;
      height: auto;
      display: block;
    }

    footer {
      text-align: center;
      font-size: clamp(6px, 0.65vw, 9px);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.42);
      padding-bottom: 6px;
      font-family: "Orbitron", Arial, sans-serif;
    }

    @media (orientation: portrait) {
      body {
        background-image: url("background_portrait.png");
      }
    }

    @media (max-width: 900px) {
      .group-logo {
        width: clamp(110px, 28vw, 210px);
      }

      .app-news {
        width: min(500px, 82vw);
      }

      .incoralis-link {
        width: min(300px, 62vw);
        margin-left: 0;
      }
    }

    @media (max-width: 520px) {
      .page {
        padding: 10px;
      }

      header {
        gap: 6px;
      }

      .top-tabs {
        grid-template-columns: repeat(4, auto);
        gap: 5px;
      }

      .top-tab {
        width: clamp(56px, 18vw, 92px);
      }

      .group-logo {
        width: clamp(105px, 38vw, 170px);
      }

      main {
        gap: clamp(24px, 4.5vh, 38px);
        padding-top: 8px;
        transform: translateY(-12px);
      }

      .app-news {
        width: 100%;
      }

      .incoralis-link {
        width: 82%;
      }

      footer {
        letter-spacing: 0.08em;
        line-height: 1.5;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <nav class="top-tabs" aria-label="Incoralis Group legal navigation">
        <a href="incoralis.html#disclaimer" class="top-tab">
          <img src="Disclaimer.png" alt="Disclaimer" />
        </a>

        <a href="incoralis.html#privacy" class="top-tab">
          <img src="Privacy.png" alt="Privacy Policy" />
        </a>

        <a href="incoralis.html#terms" class="top-tab">
          <img src="Terms.png" alt="Terms and Conditions" />
        </a>

        <a href="Group_Contact.html" class="top-tab">
          <img src="Contact.png" alt="Contact" />
        </a>
      </nav>

      <img
        src="Logo2.png"
        alt="Incoralis Group Limited"
        class="group-logo"
      />
    </header>

    <main>
      <img
        src="Appnews.png"
        alt="New app coming soon"
        class="app-news"
      />

      <a
        href="incoralis.html"
        class="incoralis-link"
        aria-label="Open Incoralis Ltd page"
      >
        <img
          src="Incoralisbutton.png"
          alt="Incoralis Ltd"
        />
      </a>
    </main>

    <footer>
      © 2026 Incoralis Group Limited. All rights reserved.
    </footer>
  </div>
</body>
</html>
