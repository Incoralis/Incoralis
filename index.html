<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incoralis Limited</title>

  <meta property="og:title" content="Incoralis Limited" />
  <meta
    property="og:description"
    content="Attuned apps designed and created to align, support & adapt to You."
  />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://incoralis.co.uk/" />
  <meta
    property="og:image"
    content="https://incoralis.co.uk/Incoralis_graph_1200x630.jpg"
  />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Incoralis Limited" />
  <meta
    name="twitter:description"
    content="Attuned apps designed and created to align, support & adapt to you."
  />
  <meta
    name="twitter:image"
    content="https://incoralis.co.uk/Incoralis_graph_1200x630.jpg"
  />

  <link rel="icon" type="image/png" href="assets/favicon.png" />

  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #000;
      color: #fff;
      font-family: "Orbitron", Arial, sans-serif;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      background-image: url("assets/background_landscape.png");
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;
    }

    .page {
      min-height: 100vh;
      padding: clamp(10px, 2vw, 32px);
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: clamp(8px, 2vw, 24px);
    }

    .top-tabs {
      display: grid;
      grid-template-columns: repeat(4, auto);
      gap: clamp(5px, 0.8vw, 12px);
      align-items: start;
      max-width: 72vw;
    }

    .top-tab {
      display: block;
      width: clamp(62px, 8vw, 108px);
      text-align: center;
      text-decoration: none;
      transition:
        transform 180ms ease,
        filter 180ms ease;
    }

    .top-tab:hover,
    .top-tab:focus-visible {
      transform: translateY(-2px);
      filter: brightness(1.18);
      outline: none;
    }

    .top-tab img {
      width: 100%;
      height: auto;
      display: block;
    }

    .group-logo {
      width: clamp(145px, 20vw, 320px);
      max-height: 170px;
      height: auto;
      object-fit: contain;
      object-position: top right;
    }

    main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: clamp(30px, 5vh, 58px);
      padding: clamp(0px, 2vh, 24px) 0 clamp(12px, 4vh, 42px);
      transform: translateY(-24px);
    }

    .app-news {
      width: min(520px, 58vw);
      max-width: 100%;
      height: auto;
      display: block;
    }

    .incoralis-link {
      display: block;
      width: min(340px, 40vw);
      margin-left: 0;
      transition:
        transform 180ms ease,
        filter 180ms ease;
    }

    .incoralis-link:hover,
    .incoralis-link:focus-visible {
      transform: translateY(-4px);
      filter: brightness(1.12);
      outline: none;
    }

    .incoralis-link img {
      width: 100%;
      height: auto;
      display: block;
    }

    footer {
      text-align: center;
      font-size: clamp(8px, 0.85vw, 12px);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.42);
      padding-bottom: 6px;
      font-family: "Orbitron", Arial, sans-serif;
    }

    @media (orientation: portrait) {
      body {
        background-image: url("assets/background_portrait.png");
      }
    }

    @media (max-width: 900px) {
      .top-tab {
        width: clamp(48px, 9vw, 78px);
      }

      .group-logo {
        width: clamp(140px, 28vw, 260px);
      }

      .app-news {
        width: min(500px, 82vw);
      }

      .incoralis-link {
        width: min(300px, 62vw);
      }
    }

    @media (max-width: 520px) {
      .page {
        padding: 10px;
      }

      header {
        gap: 6px;
      }

      .top-tabs {
        gap: 4px;
        max-width: 70vw;
      }

      .top-tab {
        width: clamp(42px, 12vw, 58px);
      }

      .group-logo {
        width: clamp(125px, 40vw, 200px);
      }

      main {
        gap: clamp(24px, 4.5vh, 38px);
        padding-top: 8px;
        transform: translateY(-12px);
      }

      .app-news {
        width: min(100%, 88vw);
      }

      .incoralis-link {
        width: min(82%, 280px);
      }

      footer {
        letter-spacing: 0.08em;
        line-height: 1.5;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <nav class="top-tabs" aria-label="Incoralis legal navigation">
        <a href="Main/disclaimer.html" class="top-tab">
          <img src="assets/disclaimer.png" alt="Disclaimer" />
        </a>

        <a href="Main/privacy.html" class="top-tab">
          <img src="assets/privacy.png" alt="Privacy Policy" />
        </a>

        <a href="Main/terms.html" class="top-tab">
          <img src="assets/terms.png" alt="Terms and Conditions" />
        </a>

        <a href="Main/contact.html" class="top-tab">
          <img src="assets/contact.png" alt="Contact" />
        </a>
      </nav>

      <img
        src="assets/incoralis_logo3.png"
        alt="Incoralis Limited"
        class="group-logo"
      />
    </header>

    <main>
      <img
        src="assets/appnews.png?v=2"
        alt="New app coming soon"
        class="app-news"
      />

      <a
        href="TC/index.html"
        class="incoralis-link"
        aria-label="Open Travel ChecknGo app page"
      >
        <img
          src="assets/incoralis_button.png"
          alt="Explore our new app"
        />
      </a>
    </main>

    <footer>
      © 2026 Incoralis Limited. Part of Incoralis Group Limited. All rights reserved.
    </footer>
  </div>
</body>
</html>
