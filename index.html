<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incoralis Group Limited</title>
  <link rel="icon" type="image/png" href="favicon.png" />

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #000;
      color: #fff;
      font-family: "Orbitron", Arial, sans-serif;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      background-image: url("background_landscape.png");
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;
    }

    .page {
      min-height: 100vh;
      padding: clamp(14px, 3vw, 40px);
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: clamp(12px, 3vw, 32px);
    }

    .top-tabs {
      display: grid;
      grid-template-columns: repeat(4, minmax(74px, 130px));
      gap: clamp(6px, 1vw, 12px);
      align-items: start;
    }

    .top-tab {
      display: block;
      text-align: center;
      text-decoration: none;
      transition: transform 180ms ease, filter 180ms ease;
    }

    .top-tab:hover,
    .top-tab:focus-visible {
      transform: translateY(-3px);
      filter: brightness(1.18);
      outline: none;
    }

    .top-tab img {
      width: 100%;
      height: auto;
      display: block;
    }

    .group-logo {
      width: clamp(120px, 21vw, 330px);
      height: auto;
      object-fit: contain;
      object-position: top right;
    }

    main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: clamp(42px, 7vh, 92px);
      padding: clamp(24px, 5vh, 64px) 0;
    }

    .app-news {
      width: min(760px, 82vw);
      height: auto;
      display: block;
    }

    .incoralis-link {
      display: block;
      width: min(620px, 72vw);
      margin-left: clamp(-260px, -18vw, -80px);
      transition: transform 180ms ease, filter 180ms ease;
    }

    .incoralis-link:hover,
    .incoralis-link:focus-visible {
      transform: translateY(-4px);
      filter: brightness(1.12);
      outline: none;
    }

    .incoralis-link img {
      width: 100%;
      height: auto;
      display: block;
    }

    footer {
      text-align: center;
      font-size: clamp(9px, 1vw, 13px);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.7);
      padding-bottom: 8px;
    }

    @media (orientation: portrait) {
      body {
        background-image: url("background_portrait.png");
      }
    }

    @media (max-width: 900px) {
      .top-tabs {
        grid-template-columns: repeat(2, minmax(72px, 118px));
      }

      .group-logo {
        width: clamp(110px, 28vw, 230px);
      }

      .app-news {
        width: min(720px, 92vw);
      }

      .incoralis-link {
        width: min(560px, 84vw);
        margin-left: 0;
      }
    }

    @media (max-width: 520px) {
      .page {
        padding: 12px;
      }

      header {
        gap: 8px;
      }

      .top-tabs {
        grid-template-columns: repeat(2, minmax(58px, 88px));
        gap: 5px;
      }

      .group-logo {
        width: clamp(92px, 34vw, 145px);
      }

      main {
        gap: clamp(32px, 6vh, 54px);
        padding-top: 34px;
      }

      .app-news {
        width: 100%;
      }

      .incoralis-link {
        width: 94%;
      }

      footer {
        letter-spacing: 0.14em;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <nav class="top-tabs" aria-label="Incoralis Group legal navigation">
        <a href="incoralis.html#disclaimer" class="top-tab">
          <img src="Disclaimer.png" alt="Disclaimer" />
        </a>

        <a href="incoralis.html#privacy" class="top-tab">
          <img src="Privacy.png" alt="Privacy Policy" />
        </a>

        <a href="incoralis.html#terms" class="top-tab">
          <img src="Terms.png" alt="Terms and Conditions" />
        </a>

        <a href="incoralis.html#contact" class="top-tab">
          <img src="Contact.png" alt="Contact" />
        </a>
      </nav>

      <img src="Logo2.png" alt="Incoralis Group Limited" class="group-logo" />
    </header>

    <main>
      <img src="Appnews.png" alt="New app coming soon" class="app-news" />

      <a href="incoralis.html" class="incoralis-link" aria-label="Open Incoralis Ltd page">
        <img src="Incoralisbutton.png" alt="Incoralis Ltd - Explore our new app" />
      </a>
    </main>

    <footer>Incoralis Group Limited</footer>
  </div>
</body>
</html>
