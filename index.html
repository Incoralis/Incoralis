<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incoralis Group Limited</title>
  <link rel="icon" type="image/png" href="favicon.png" />

  <style>
    :root {
      --blue: #00bfff;
      --cyan: #00ebff;
      --purple: #a85cff;
      --pink: #ff3fb4;
      --orange: #ff7a18;
      --white: #ffffff;
      --soft: rgba(255, 255, 255, 0.78);
      --panel: rgba(3, 5, 12, 0.78);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--white);
      background: #000;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      background-image:
        radial-gradient(circle at 48% 32%, rgba(0, 235, 255, 0.10), transparent 28%),
        radial-gradient(circle at 72% 70%, rgba(255, 122, 24, 0.08), transparent 30%),
        linear-gradient(120deg, rgba(0, 0, 0, 0.86), rgba(0, 0, 0, 0.34), rgba(0, 0, 0, 0.9)),
        url("background.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .page {
      min-height: 100vh;
      padding: clamp(16px, 3vw, 42px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 24px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
    }

    .group-tabs {
      display: grid;
      grid-template-columns: repeat(4, minmax(100px, 150px));
      gap: 0;
    }

    .group-tab {
      min-height: 86px;
      padding: 14px 12px 10px;
      text-align: center;
      color: var(--white);
      text-decoration: none;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0));
      border-left: 1px solid rgba(255,255,255,0.08);
      border-right: 1px solid rgba(255,255,255,0.05);
      border-bottom: 2px solid var(--accent);
      box-shadow: 0 8px 18px rgba(0,0,0,0.35), 0 8px 18px color-mix(in srgb, var(--accent) 20%, transparent);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .group-tab:hover,
    .group-tab:focus-visible {
      transform: translateY(-3px);
      box-shadow: 0 12px 26px rgba(0,0,0,0.45), 0 10px 28px color-mix(in srgb, var(--accent) 45%, transparent);
      outline: none;
    }

    .group-icon {
      display: block;
      font-size: 27px;
      line-height: 1;
      color: var(--accent);
      text-shadow: 0 0 16px var(--accent);
      margin-bottom: 12px;
    }

    .group-label {
      display: block;
      font-size: clamp(10px, 1vw, 13px);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .logo {
      width: clamp(150px, 22vw, 360px);
      max-height: 155px;
      object-fit: contain;
      object-position: top right;
      filter: drop-shadow(0 0 18px rgba(0, 235, 255, 0.22));
    }

    main {
      display: grid;
      align-content: center;
      justify-items: center;
      gap: clamp(26px, 5vh, 46px);
      padding: 12px 0 24px;
    }

    .coming-soon {
      width: min(760px, 90vw);
      min-height: clamp(150px, 22vw, 235px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: clamp(24px, 4vw, 42px);
      border-radius: clamp(22px, 3vw, 36px);
      background:
        linear-gradient(100deg, rgba(0,191,255,0.12), transparent 32%, rgba(255,63,180,0.10), rgba(255,122,24,0.12)),
        linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.02)),
        var(--panel);
      border: 2px solid transparent;
      background-clip: padding-box;
      position: relative;
      box-shadow:
        inset 0 0 20px rgba(255,255,255,0.07),
        0 0 22px rgba(0,191,255,0.30),
        0 0 26px rgba(168,92,255,0.26),
        0 0 28px rgba(255,122,24,0.24);
    }

    .coming-soon::before,
    .incoralis-card::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: inherit;
      padding: 2px;
      background: linear-gradient(90deg, var(--blue), var(--purple), var(--pink), var(--orange));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .small-title {
      margin: 0;
      font-size: clamp(25px, 4.2vw, 50px);
      letter-spacing: 0.18em;
      line-height: 1;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--blue), var(--white), var(--purple), var(--pink));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 18px rgba(0,191,255,0.25);
    }

    .main-title {
      margin: 12px 0 0;
      font-size: clamp(34px, 6.4vw, 82px);
      letter-spacing: 0.08em;
      line-height: 0.95;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--blue), var(--white), var(--purple), var(--pink), var(--orange));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 14px rgba(0,191,255,0.25));
    }

    .tagline {
      width: min(590px, 92%);
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.16);
      color: var(--soft);
      font-size: clamp(10px, 1.4vw, 14px);
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    .incoralis-card {
      width: min(640px, 86vw);
      min-height: clamp(120px, 17vw, 170px);
      margin-left: clamp(-230px, -15vw, -40px);
      padding: clamp(22px, 3.5vw, 36px);
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 18px;
      text-decoration: none;
      color: var(--white);
      border-radius: clamp(20px, 2.7vw, 32px);
      background:
        linear-gradient(100deg, rgba(0,191,255,0.14), transparent 45%, rgba(255,122,24,0.12)),
        linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.02)),
        var(--panel);
      position: relative;
      box-shadow:
        inset 0 0 20px rgba(255,255,255,0.06),
        0 0 24px rgba(0,191,255,0.32),
        0 0 30px rgba(255,122,24,0.22);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .incoralis-card:hover,
    .incoralis-card:focus-visible {
      transform: translateY(-5px);
      box-shadow:
        inset 0 0 22px rgba(255,255,255,0.08),
        0 0 34px rgba(0,191,255,0.44),
        0 0 42px rgba(255,122,24,0.36);
      outline: none;
    }

    .incoralis-card h2 {
      margin: 0;
      font-size: clamp(28px, 4.6vw, 54px);
      letter-spacing: 0.13em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--blue), var(--white), var(--purple), var(--pink), var(--orange));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .incoralis-card p {
      margin: 8px 0 0;
      color: var(--soft);
      font-size: clamp(10px, 1.5vw, 15px);
      letter-spacing: 0.26em;
      text-transform: uppercase;
    }

    .arrow {
      font-size: clamp(34px, 5vw, 58px);
      color: var(--orange);
      text-shadow: 0 0 18px var(--orange);
    }

    footer {
      text-align: center;
      color: rgba(255,255,255,0.68);
      font-size: clamp(10px, 1.2vw, 14px);
      letter-spacing: 0.38em;
      text-transform: uppercase;
      padding-bottom: 8px;
    }

    @media (max-width: 900px) {
      header {
        align-items: flex-start;
      }

      .group-tabs {
        grid-template-columns: repeat(2, minmax(112px, 1fr));
        max-width: 330px;
      }

      .group-tab {
        min-height: 74px;
      }

      .logo {
        width: clamp(140px, 28vw, 260px);
      }

      .incoralis-card {
        margin-left: 0;
      }
    }

    @media (max-width: 560px) {
      .page {
        padding: 14px;
      }

      header {
        gap: 12px;
      }

      .group-tabs {
        grid-template-columns: repeat(2, minmax(92px, 1fr));
        max-width: 220px;
      }

      .group-tab {
        min-height: 58px;
        padding: 8px 7px 7px;
      }

      .group-icon {
        font-size: 18px;
        margin-bottom: 7px;
      }

      .group-label {
        font-size: 9px;
        letter-spacing: 0.04em;
      }

      .logo {
        width: clamp(110px, 34vw, 155px);
      }

      main {
        gap: 24px;
        padding-top: 24px;
      }

      .coming-soon {
        width: 100%;
      }

      .tagline {
        letter-spacing: 0.12em;
      }

      .incoralis-card {
        width: 100%;
        grid-template-columns: 1fr auto;
      }

      .incoralis-card p {
        letter-spacing: 0.12em;
      }

      footer {
        letter-spacing: 0.18em;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <nav class="group-tabs" aria-label="Incoralis Group navigation">
        <a href="incoralis.html#disclaimer" class="group-tab" style="--accent: var(--orange);">
          <span class="group-icon">♢</span>
          <span class="group-label">Disclaimer</span>
        </a>
        <a href="incoralis.html#privacy" class="group-tab" style="--accent: var(--purple);">
          <span class="group-icon">▣</span>
          <span class="group-label">Privacy Policy</span>
        </a>
        <a href="incoralis.html#terms" class="group-tab" style="--accent: var(--blue);">
          <span class="group-icon">▤</span>
          <span class="group-label">Terms &amp; Conditions</span>
        </a>
        <a href="incoralis.html#contact" class="group-tab" style="--accent: var(--cyan);">
          <span class="group-icon">☎</span>
          <span class="group-label">Contact</span>
        </a>
      </nav>

      <img src="Logo2.png" alt="Incoralis Group Limited" class="logo" />
    </header>

    <main>
      <section class="coming-soon" aria-label="New app coming soon">
        <h1 class="small-title">New App</h1>
        <div class="main-title">Coming Soon!</div>
        <div class="tagline">Innovative • Reliable • Designed for you</div>
      </section>

      <a href="incoralis.html" class="incoralis-card" aria-label="Open Incoralis Ltd section">
        <div>
          <h2>Incoralis Ltd</h2>
          <p>Explore our new app</p>
        </div>
        <div class="arrow">›</div>
      </a>
    </main>

    <footer>Incoralis Group Limited</footer>
  </div>
</body>
</html>
