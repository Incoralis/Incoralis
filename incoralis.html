<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incoralis Ltd</title>

  <link rel="icon" type="image/png" href="favicon.png" />

  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --cyan: #00ebff;
      --white: #ffffff;
      --soft: rgba(255, 255, 255, 0.78);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--white);
      background: #000;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      background-image:
        radial-gradient(circle at 50% 22%, rgba(0, 235, 255, 0.10), transparent 26%),
        linear-gradient(120deg, rgba(0, 0, 0, 0.88), rgba(0, 0, 0, 0.42), rgba(0, 0, 0, 0.92)),
        url("background.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .page {
      min-height: 100vh;
      padding: clamp(16px, 3vw, 42px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 26px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      min-height: 42px;
      padding: 10px 18px;
      color: var(--white);
      text-decoration: none;
      text-transform: uppercase;
      font-size: clamp(11px, 1vw, 13px);
      letter-spacing: 0.12em;
      border-bottom: 2px solid var(--cyan);
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0));
      box-shadow: 0 8px 22px rgba(0,235,255,0.18);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .back-link:hover,
    .back-link:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0,235,255,0.34);
      outline: none;
    }

    .logo {
      width: clamp(180px, 26vw, 420px);
      max-height: 220px;
      object-fit: contain;
      object-position: top right;
      filter: drop-shadow(0 0 18px rgba(0, 235, 255, 0.22));
    }

    main {
      display: grid;
      align-content: center;
      justify-items: center;
      gap: clamp(28px, 6vh, 56px);
      padding: 10px 0 24px;
    }

    .app-news {
      width: min(520px, 70vw);
      height: auto;
      display: block;
    }

    .legal-tabs {
      display: grid;
      grid-template-columns: repeat(4, auto);
      justify-content: center;
      gap: clamp(12px, 2vw, 20px);
      align-items: center;
      margin-top: clamp(10px, 2vh, 22px);
    }

    .legal-tab {
      display: block;
      width: clamp(96px, 12vw, 150px);
      text-decoration: none;
      transition: transform 180ms ease, filter 180ms ease;
    }

    .legal-tab:hover,
    .legal-tab:focus-visible {
      transform: translateY(-2px);
      filter: brightness(1.18);
      outline: none;
    }

    .legal-tab img {
      width: 100%;
      height: auto;
      display: block;
    }

    footer {
      text-align: center;
      font-size: clamp(6px, 0.65vw, 9px);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.42);
      padding-bottom: 6px;
      font-family: "Orbitron", Arial, sans-serif;
    }

    @media (max-width: 820px) {
      .logo {
        width: clamp(170px, 34vw, 320px);
      }
    }

    @media (max-width: 500px) {
      .page {
        padding: 14px;
      }

      .logo {
        width: clamp(145px, 46vw, 230px);
      }

      .back-link {
        padding: 8px 12px;
      }

      .legal-tab {
        width: clamp(72px, 20vw, 110px);
      }

      .app-news {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <a class="back-link" href="index.html">← Back to Main Page</a>

      <img src="Logo3.png" alt="Incoralis Ltd" class="logo" />
    </header>

    <main>
      <img
        src="Appnews.png"
        alt="New app coming soon"
        class="app-news"
      />

      <nav class="legal-tabs" aria-label="Incoralis legal and support links">
        <a href="#disclaimer" class="legal-tab">
          <img src="Disclaimer.png" alt="Disclaimer" />
        </a>

        <a href="#privacy" class="legal-tab">
          <img src="Privacy.png" alt="Privacy Policy" />
        </a>

        <a href="#terms" class="legal-tab">
          <img src="Terms.png" alt="Terms and Conditions" />
        </a>

        <a href="#contact" class="legal-tab">
          <img src="Contact.png" alt="Contact" />
        </a>
      </nav>
    </main>

    <footer>
      © 2026 Incoralis Limited. All rights reserved.
    </footer>
  </div>
</body>
</html>
